default_language_version:
  python: python3.10

repos:
  # ── General hygiene ─────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ["--branch", "main", "--branch", "master"]

  # ── Ruff (lint + isort) ─────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  # ── Black (format) ──────────────────────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        language_version: python3.10

  # ── Mypy (type check — only src/) ───────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        files: ^src/
        additional_dependencies:
          - pydantic>=2.7
          - pydantic-settings>=2.2
          - torch-stubs

  # ── LGPD: bloqueia commit se PII detectado em arquivos staged ───────────────
  - repo: local
    hooks:
      - id: lgpd-pii-check
        name: LGPD PII Audit (staged files)
        language: python
        entry: python scripts/lgpd_audit.py
        args: ["--target", "logs/", "--target", "outputs/"]
        pass_filenames: false
        always_run: false
        stages: [commit]
        # Só executa se os diretórios existirem; não falha se estiverem vazios

      - id: no-pii-in-tests
        name: No PII in test fixtures
        language: python
        entry: python -c "
import sys, re;
cpf = re.compile(r'\b\d{3}[.\-]?\d{3}[.\-]?\d{3}[-]?\d{2}\b');
found = [f for f in sys.argv[1:] if cpf.search(open(f).read())];
sys.exit(1) if found else None
"
        types: [python]
        files: ^tests/
